<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 620 660" width="100%" height="100%">
  <defs>
    <clipPath id="gridClip">
      <rect x="50" y="30" width="520" height="520" rx="16"/>
    </clipPath>

    <!-- 🐑 Emoji-style flat sheep -->
    <g id="sheep">
      <!-- Woolly body - big fluffy cloud shape -->
      <circle cx="40" cy="32" r="14" fill="currentColor"/>
      <circle cx="55" cy="28" r="12" fill="currentColor"/>
      <circle cx="28" cy="28" r="11" fill="currentColor"/>
      <circle cx="42" cy="22" r="11" fill="currentColor"/>
      <circle cx="56" cy="38" r="11" fill="currentColor"/>
      <circle cx="27" cy="38" r="11" fill="currentColor"/>
      <ellipse cx="42" cy="40" rx="20" ry="10" fill="currentColor"/>

      <!-- Legs - two visible, dark -->
      <rect x="30" y="47" width="6" height="14" rx="3" fill="#5D4037"/>
      <rect x="48" y="47" width="6" height="14" rx="3" fill="#5D4037"/>

      <!-- Head - round, white/cream like emoji -->
      <circle cx="14" cy="32" r="11" fill="#F5F0EB"/>
      <circle cx="14" cy="32" r="11" fill="none" stroke="#E0D6CC" stroke-width="0.8"/>

      <!-- Ears -->
      <ellipse cx="6" cy="24" rx="5" ry="3.5" fill="#F5E0D0" transform="rotate(-30 6 24)"/>
      <ellipse cx="22" cy="23" rx="4.5" ry="3" fill="#F5E0D0" transform="rotate(20 22 23)"/>

      <!-- Eyes - emoji style dots -->
      <circle cx="10" cy="30" r="1.8" fill="#333"/>
      <circle cx="18" cy="30" r="1.8" fill="#333"/>

      <!-- Blush cheeks -->
      <ellipse cx="7" cy="35" rx="3" ry="1.8" fill="#FFCACA" opacity="0.5"/>
      <ellipse cx="21" cy="35" rx="3" ry="1.8" fill="#FFCACA" opacity="0.5"/>

      <!-- Nose -->
      <ellipse cx="14" cy="35" rx="2.2" ry="1.5" fill="#D4B5A0"/>

      <!-- Mouth -->
      <path d="M12.5 37.5 Q14 39.5 15.5 37.5" fill="none" stroke="#C9A68A" stroke-width="0.8" stroke-linecap="round"/>
    </g>
  </defs>

  <!-- Grid card -->
  <rect x="50" y="30" width="520" height="520" rx="16" fill="#FFFFFF"/>

  <!-- Alternating row stripes -->
  <g clip-path="url(#gridClip)">
    <rect x="50" y="116.67" width="520" height="86.67" fill="#F7F8FA"/>
    <rect x="50" y="290"    width="520" height="86.67" fill="#F7F8FA"/>
    <rect x="50" y="463.33" width="520" height="86.67" fill="#F7F8FA"/>
  </g>

  <!-- Grid lines -->
  <g stroke="#E8ECF0" stroke-width="1">
    <line x1="136.67" y1="30"  x2="136.67" y2="550"/>
    <line x1="223.33" y1="30"  x2="223.33" y2="550"/>
    <line x1="310"    y1="30"  x2="310"    y2="550"/>
    <line x1="396.67" y1="30"  x2="396.67" y2="550"/>
    <line x1="483.33" y1="30"  x2="483.33" y2="550"/>
    <line x1="50"  y1="116.67" x2="570" y2="116.67"/>
    <line x1="50"  y1="203.33" x2="570" y2="203.33"/>
    <line x1="50"  y1="290"    x2="570" y2="290"/>
    <line x1="50"  y1="376.67" x2="570" y2="376.67"/>
    <line x1="50"  y1="463.33" x2="570" y2="463.33"/>
  </g>

  <!-- Grid card border -->
  <rect x="50" y="30" width="520" height="520" rx="16" fill="none" stroke="#E0E4E8" stroke-width="1.5"/>

  <!-- Column labels -->
  <g font-family="'Inter','SF Pro Display','Helvetica Neue',sans-serif" font-size="13" fill="#A0A8B4" text-anchor="middle" font-weight="600">
    <text x="93.33"  y="22">1</text>
    <text x="180"    y="22">2</text>
    <text x="266.67" y="22">3</text>
    <text x="353.33" y="22">4</text>
    <text x="440"    y="22">5</text>
    <text x="526.67" y="22">6</text>
  </g>

  <!-- Row labels -->
  <g font-family="'Inter','SF Pro Display','Helvetica Neue',sans-serif" font-size="13" fill="#A0A8B4" text-anchor="middle" font-weight="600">
    <text x="38" y="78">1</text>
    <text x="38" y="165">2</text>
    <text x="38" y="251">3</text>
    <text x="38" y="338">4</text>
    <text x="38" y="424">5</text>
    <text x="38" y="511">6</text>
  </g>

  <!-- Sheep placements (centered in 86.67×86.67 cells) -->

  <!-- Red sheep — col1, row1 -->
  <use href="#sheep" x="60"  y="43"  color="#FF6B6B"/>

  <!-- Blue sheep — col4, row1 -->
  <use href="#sheep" x="320" y="43"  color="#54A0FF"/>

  <!-- Blue sheep — col5, row3 -->
  <use href="#sheep" x="406" y="216" color="#54A0FF"/>

  <!-- Red sheep — col4, row4 -->
  <use href="#sheep" x="320" y="303" color="#FF6B6B"/>

  <!-- Blue sheep — col4, row5 -->
  <use href="#sheep" x="233" y="390" color="#54A0FF"/>

  <!-- Red sheep — col5, row6 -->
  <use href="#sheep" x="406" y="476" color="#FF6B6B"/>

  <!-- Legend card -->
  <rect x="130" y="575" width="360" height="60" rx="12" fill="#FFFFFF" stroke="#E0E4E8" stroke-width="1.2"/>

  <!-- Red legend -->
  <circle cx="175" cy="605" r="10" fill="#FF6B6B"/>
  <text x="195" y="610" font-family="'Inter','SF Pro Display','Helvetica Neue',sans-serif" font-size="14" fill="#4A5568" font-weight="500">
    红色羊 Red
  </text>

  <!-- Blue legend -->
  <circle cx="370" cy="605" r="10" fill="#54A0FF"/>
  <text x="390" y="610" font-family="'Inter','SF Pro Display','Helvetica Neue',sans-serif" font-size="14" fill="#4A5568" font-weight="500">
    蓝色羊 Blue
  </text>
</svg>
